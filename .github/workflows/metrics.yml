name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Configuración compacta
          user: cgarciafernando
          template: classic
          base: header, repositories
          config_timezone: Europe/Madrid
          
          # PLUGIN DE TRÁFICO (Aquí se verán los Clones)
          plugin_traffic: yes

          # LENGUAJES (En formato compacto)
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 6

          # REPOS DESTACADOS
          plugin_repositories: yes
          plugin_repositories_featured: cgarciafernando/sentinel2-orbital-monitor, cgarciafernando/fungiclef-2025-tfg
