name: Metrics
on:
  # Se actualiza cada medianoche
  schedule:
    - cron: "0 0 * * *"
  # Permite ejecutarlo manualmente desde la pestaña Actions
  workflow_dispatch:
  # Se ejecuta cada vez que haces un cambio en la rama principal
  push:
    branches: ["master", "main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Tu usuario
          user: cgarciafernando
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Europe/Madrid
          
          # Plugins para que quede "pro"
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # Mostrar tus repos destacados
          plugin_repositories: yes
          plugin_repositories_featured: cgarciafernando/sentinel2-orbital-monitor, cgarciafernando/fungiclef-2025-tfg
