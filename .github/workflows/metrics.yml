name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Se actualiza cada medianoche
  workflow_dispatch: # Permite ejecutarlo manualmente
push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Configuración visual
          user: cgarciafernando
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Europe/Madrid
          
          # Destacar tus proyectos específicos (Pins)
          plugin_projects: yes
          plugin_projects_limit: 4
          
          # Mostrar lenguajes (muy pro para Data Engineering)
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          
          # Mostrar tus repos seleccionados (Sentinel y FungiCLEF)
          plugin_repositories: yes
          plugin_repositories_pinned: 2
          # Aquí forzamos que use tus dos repos estrella
          plugin_repositories_featured: cgarciafernando/sentinel2-orbital-monitor, cgarciafernando/fungiclef-2025-tfg
